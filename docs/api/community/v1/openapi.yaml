openapi: 3.1.0
info:
  title: Schema Service
  description: "Schema Service enables a centralized governance and management of\
    \ schema in the Data Ecosystem. It offers an implementation of the schema standard.\
    \ <p>Schema Service provides all necessary APIs to Fetch, create, update and mark\
    \ a schema obsolete.</p>"
  contact:
    name: OSDU Data Platform Team
    email: dps@OSDU.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
servers:
- url: /api/schema-service/v1
security:
- Authorization: []
tags:
- name: schema-api
  description: Schema API - Core Schema related endpoints
- name: health-check-api
  description: Health Check API
- name: info
  description: Version info endpoint
- name: system-schema-api
  description: System Schema API - System Schema related endpoints
paths:
  /schemas/system:
    put:
      tags:
      - system-schema-api
      summary: Creates/Updates a schema in development status
      description: "Creates a new schema or updates an already existing schema with\
        \ status `DEVELOPMENT` in the schema repository. If a user tries to create\
        \ a schema with status other than `DEVELOPMENT`, API will not throw an exception.\
        \ <p>The update of schema without `DEVELOPMENT` status would cause error.\
        \ Any schema instance with the same schemaIdentity is replaced. A schema state\
        \ can also be changed from `DEVELOPMENT` to `PUBLISHED` or `OBSOLETE` while\
        \ updating schema content or by providing the same schema content.</p> <p>**Note:**\
        \ The schema may refer to other schema definitions in `DEVELOPMENT` state.\
        \ If those schemas are updated themselves, it is the developer's responsibility\
        \ to PUT the dependent schemas again to update the schema. Scope for a schema\
        \ will be SHARED for all the schemas created using this API.</p><p>Service\
        \ principal authorization is required to call thi API.</p>"
      operationId: upsertSystemSchema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaRequest"
        required: true
      responses:
        "200":
          description: Schema updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfo"
        "201":
          description: Schema created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfo"
        "400":
          description: Bad user input. Mandatory fields missing or unacceptable value
            passed to API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /schema:
    get:
      tags:
      - schema-api
      summary: Searches SchemaInfo repository
      description: "Searches for information of available schema (SchemaInfo) in schema\
        \ repository. Support options to filter out the search contents. <p>Required\
        \ roles:  `service.schema-service.viewers` groups to get the schema.</p>"
      operationId: getSchemaInfoList
      parameters:
      - name: authority
        in: query
        description: pass an optional string to search for a specific authority
        required: false
        schema:
          type: string
        example: osdu
      - name: source
        in: query
        description: pass an optional string to search for a specific source
        required: false
        schema:
          type: string
        example: wks
      - name: entityType
        in: query
        description: pass an optional string to search for a specific entityType
        required: false
        schema:
          type: string
        example: wellbore
      - name: schemaVersionMajor
        in: query
        description: pass an optional string to search for a specific schemaVersionMajor
        required: false
        schema:
          type: integer
          format: int64
        example: 1
      - name: schemaVersionMinor
        in: query
        description: pass an optional string to search for a specific schemaVersionMinor
        required: false
        schema:
          type: integer
          format: int64
        example: 1
      - name: schemaVersionPatch
        in: query
        description: pass an optional string to search for a specific schemaVersionPatch
        required: false
        schema:
          type: integer
          format: int64
        example: 0
      - name: status
        in: query
        description: The schema status specification
        required: false
        schema:
          type: string
          default: PUBLISHED
        example: PUBLISHED
      - name: scope
        in: query
        description: The scope or schema visibility specification
        required: false
        schema:
          type: string
          default: INTERNAL
        example: INTERNAL
      - name: latestVersion
        in: query
        description: "if True, only return the latest version"
        required: false
        schema:
          type: boolean
          default: false
        example: "True"
      - name: limit
        in: query
        description: maximum number of schema records to return
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 0
        example: 10
      - name: offset
        in: query
        description: number of records to skip for pagination
        required: false
        schema:
          type: integer
          minimum: 0
        example: 0
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfoResponse"
        "400":
          description: Bad user input. Mandatory fields missing or unacceptable value
            passed to API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Requested Schema not found in repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
    put:
      tags:
      - schema-api
      summary: Creates/Updates a schema in development status
      description: "Creates a new schema or updates an already existing schema with\
        \ status `DEVELOPMENT` in the schema repository. If a user tries to create/update\
        \ a schema with status other than `DEVELOPMENT`, API will throw an exception.\
        \ <p>Any schema instance with the same schemaIdentity is replaced (in contrast\
        \ to the immutability of `PUBLISHED` or `OBSOLETE` schemas). A schema state\
        \ can also be changed from `DEVELOPMENT` to `PUBLISHED` or `OBSOLETE` while\
        \ updating schema content or by providing the same schema content.</p> <p>**Note:**\
        \ The schema may refer to other schema definitions in `DEVELOPMENT` state.\
        \ If those schemas are updated themselves, it is the developer's responsibility\
        \ to PUT the dependent schemas again to update the schemas. Scope for a schema\
        \ can't be updated, its a system defined value.</p> <p>Required roles:  `service.schema-service.editors`\
        \ groups to update schema.</p>"
      operationId: upsertSchema
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaRequest"
        required: true
      responses:
        "200":
          description: Schema updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfo"
        "201":
          description: Schema created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfo"
        "400":
          description: Bad user input. Mandatory fields missing or unacceptable value
            passed to API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
    post:
      tags:
      - schema-api
      summary: Adds a schema to the schema repository.
      description: "Adds a schema to the schema repository. The schemaIdentity must\
        \ be unique. The `authority`, `source` and `entityType` will be registered\
        \ if not present. <p>If lower minor versions are registered the service validates\
        \ the new schema against breaking changes; if breaking changes are discovered\
        \ the request fails.</p> <p>**Note:** The schema must not reference other\
        \ schemas with status `DEVELOPMENT`. Scope to a schema will be set by system\
        \ based on partition id (`SHARED` for common tenant and `INTERNAL` for private\
        \ tenant). </p><p>Required roles : `service.schema-service.editors` groups\
        \ to create schema.</p>"
      operationId: createSchema
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaRequest"
        required: true
      responses:
        "201":
          description: Schema created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaInfo"
        "400":
          description: Bad user input. Mandatory fields missing or unacceptable value
            passed to API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /schema/{id}:
    get:
      tags:
      - schema-api
      summary: Gets schema from the schema repository.
      description: "Retrieve a schema using its system defined id. Required roles:\
        \  `service.schema-service.viewers` groups to get the schema."
      operationId: getSchema
      parameters:
      - name: id
        in: path
        description: The system id of the schema
        required: true
        schema:
          type: string
        example: osdu:wks:wellbore:1.0.0
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Schema retrieved successfully
          content:
            application/json:
              schema:
                type: object
              example:
                $schema: http://json-schema.org/draft-07/schema#
                description: The entity shapefile.
                title: ShapeFile
                type: object
                definitions: {}
                properties: {}
        "400":
          description: Bad user input. Mandatory fields missing or unacceptable value
            passed to API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Requested Schema not found in repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /liveness_check:
    get:
      tags:
      - health-check-api
      summary: Liveness Check endpoint
      description: For deployment available public `/liveness_check` endpoint verifies
        the operational status of the Schema Service.
      operationId: livenessCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
  /info:
    get:
      tags:
      - info
      summary: Version info
      description: "For deployment available public `/info` endpoint, which provides\
        \ build and git related information."
      operationId: info
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
components:
  schemas:
    SchemaIdentity:
      type: object
      description: Schema authority source and type description
      properties:
        authority:
          type: string
          description: Entity authority
          example: osdu
          pattern: "^[\\w\\-\\.]+$"
        source:
          type: string
          description: Entity source
          example: wks
          pattern: "^[\\w\\-\\.]+$"
        entityType:
          type: string
          description: EntityType Code
          example: wellbore
          pattern: "^[\\w\\-\\.]+$"
        schemaVersionMajor:
          type: integer
          format: int64
          description: Major Schema Version Number
          example: 1
        schemaVersionMinor:
          type: integer
          format: int64
          description: Minor Schema Version Number
          example: 1
        schemaVersionPatch:
          type: integer
          format: int64
          description: Patch Schema Version Number
          example: 0
        id:
          type: string
          description: A read-only system defined id used for referencing of a schema.
          example: osdu:wks:wellbore:1.0.0
      required:
      - authority
      - entityType
      - schemaVersionMajor
      - schemaVersionMinor
      - schemaVersionPatch
      - source
      title: SchemaIdentity
    SchemaInfo:
      type: object
      description: "Represents a model to Schema Info including status, creation and\
        \ schemaIdentity"
      properties:
        schemaIdentity:
          $ref: "#/components/schemas/SchemaIdentity"
          description: "Schema identity information including authority, source, entity\
            \ type and version"
        createdBy:
          type: string
          description: The user who created the schema. This value is taken from API
            caller token.
          example: user@opendes.com
        dateCreated:
          type: string
          format: date-time
          description: The UTC date time of the entity creation
          example: 2019-05-23T11:16:03Z
        status:
          type: string
          description: Schema lifecycle status
          enum:
          - PUBLISHED
          - OBSOLETE
          - DEVELOPMENT
          example: PUBLISHED
          title: SchemaStatus
        scope:
          type: string
          description: Schema visibility — INTERNAL (partition-scoped) or SHARED (platform-wide).
            System-assigned based on the partition-id.
          enum:
          - INTERNAL
          - SHARED
          example: INTERNAL
          title: Schema Scope
        supersededBy:
          $ref: "#/components/schemas/SchemaIdentity"
          description: The schema identity of the schema that supersedes this one.
            Present only when this schema has been superseded.
      required:
      - schemaIdentity
      - status
      title: Schema Info
    SchemaRequest:
      type: object
      description: Represents a model to Schema Request
      properties:
        schemaInfo:
          $ref: "#/components/schemas/SchemaInfo"
          description: Schema identity and metadata
        schema:
          type: string
          description: The JSON Schema definition as a JSON object
          example:
            $schema: http://json-schema.org/draft-07/schema#
            title: Wellbore
            type: object
      required:
      - schema
      - schemaInfo
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    SchemaInfoResponse:
      type: object
      description: The response for a GET schema request
      properties:
        schemaInfos:
          type: array
          items:
            $ref: "#/components/schemas/SchemaInfo"
        offset:
          type: integer
          format: int32
          description: The offset for the next query
          minimum: 0
        count:
          type: integer
          format: int32
          description: The number of schema versions in this response
          minimum: 0
        totalCount:
          type: integer
          format: int32
          description: The total number of entity type codes in the repositories
          minimum: 0
      title: Schema Info Response
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
